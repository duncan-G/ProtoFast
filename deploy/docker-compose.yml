# Production compose topology for the ProtoFast stack.
#
# Hand-written to mirror the AppHost publish-mode wiring (apphost/Program.cs):
# Envoy in `publish` mode (one vhost per client domain → unified SSR host with an
# x-client header), the three gRPC services, the otel-collector, a standalone
# Aspire Dashboard, and cloudflared (the only thing reaching the public edge).
#
# There are NO published host ports: cloudflared dials out to Cloudflare and
# reaches Envoy over the internal Docker network. The EC2 security group allows
# no ingress at all.
#
# Each component is deployed INDEPENDENTLY (docs/independent-deployment-plan.md):
# every image is referenced by its OWN content-hash tag variable
# (${ENVOY_TAG}, ${AUTH_TAG}, …) rather than one shared ${TAG}. The deploy
# script (deploy/deploy.sh) reads .env (stable: ECR, domains, ASSETS_BUCKET,
# CLIENTS) + versions.env (one *_TAG per component) and recreates only the
# container whose tag changed. Locally: provide both env files, e.g.
# `docker compose --env-file .env --env-file versions.env up`.
#
# Client apps are NOT baked into the clients-host image. They are built to static
# SSR output and uploaded to S3 by their own workflows; the clients-host
# entrypoint pulls each pinned client from S3 on (re)start (plan §7).

x-otel-grpc: &otel-grpc "http://otel-collector:4317"

services:
  cloudflared:
    # Pinned upstream image, deployed as a component like aspire-dashboard:
    # `deploy.sh apply cloudflared=<tag>` (workflow deploy-cloudflared.yml) writes
    # CLOUDFLARED_TAG into versions.env. Keep this default in sync with
    # DEFAULT_CLOUDFLARED_TAG in that workflow; the default also covers a partial
    # manifest so the edge ref never collapses to "cloudflare/cloudflared:".
    image: cloudflare/cloudflared:${CLOUDFLARED_TAG:-2026.6.1}
    restart: unless-stopped
    # Run as root: the tunnel-token secret is bind-mounted from the host file
    # /opt/protofast/tunnel-token (cloud-init creates it root-owned, mode 0600).
    # The upstream image runs as a non-root user, and non-swarm compose keeps the
    # host file's ownership/mode for file-based secrets (uid/gid/mode long-syntax
    # are not honored here), so a non-root process gets "permission denied"
    # reading /run/secrets/tunnel-token. Root reads it and keeps the host token
    # root-only (no need to loosen its 0600).
    user: "0:0"
    # Outbound-only QUIC tunnel. The tunnel's public-hostname config (managed in
    # Terraform/Cloudflare) routes every client domain to https://envoy:8443 with
    # originRequest.noTLSVerify=true, so Envoy's baked self-signed cert is fine.
    # --metrics exposes the readiness endpoint (GET /ready -> 200 once >=1 edge
    # connection is registered) that the deploy health check curls on the network.
    command: tunnel --no-autoupdate --metrics 0.0.0.0:2000 run --token-file /run/secrets/tunnel-token
    secrets:
      - tunnel-token
    depends_on:
      envoy:
        condition: service_started

  envoy:
    image: ${ECR}/protofast-envoy:${ENVOY_TAG}
    restart: unless-stopped
    environment:
      ENVOY_MODE: publish
      CLIENTS: ${CLIENTS:-admin,protofast}
      DEFAULT_CLIENT: ${DEFAULT_CLIENT:-protofast}
      # Publish listener cloudflared targets (https://envoy:8443).
      PORT: "8443"
      ENVOY_ADMIN_PORT: "9901"
      # Per-client virtual host domains.
      CLIENT_ADMIN_DOMAIN: ${CLIENT_ADMIN_DOMAIN:-admin.example.com}
      CLIENT_PROTOFAST_DOMAIN: ${CLIENT_PROTOFAST_DOMAIN:-protofast.example.com}
      # Catch-all upstream: the unified SSR host.
      CLIENTS_HOST_HOST: clients
      CLIENTS_HOST_PORT: "4000"
      # gRPC service upstreams (h2c on 8080).
      AUTH_HOST: auth
      AUTH_PORT: "8080"
      PAYMENTS_HOST: payments
      PAYMENTS_PORT: "8080"
      API_HOST: api
      API_PORT: "8080"
      # Telemetry plumbing (otel-collector receivers).
      OTEL_INSTANCE_ID: envoy
      OTEL_GRPC_HOST: otel-collector
      OTEL_GRPC_PORT: "4317"
      OTEL_HTTP_HOST: otel-collector
      OTEL_HTTP_PORT: "4318"
      # ENVOY_TLS_CERT/ENVOY_TLS_KEY default to the baked self-signed cert.
    # No container healthcheck (the envoy image has no bundled curl/wget). The
    # deploy script is the real health gate — it curls the tunnel/Envoy path with
    # each client Host header and grpc_health_probes the services (deploy.sh).
    depends_on:
      clients:
        condition: service_started
      auth:
        condition: service_healthy
      payments:
        condition: service_healthy
      api:
        condition: service_healthy

  clients:
    # Unified SSR host (clients/host/Dockerfile). No client assets are baked in:
    # the entrypoint pulls each pinned client from S3 before starting server.mjs.
    image: ${ECR}/protofast-clients-host:${CLIENTS_HOST_TAG}
    restart: unless-stopped
    # env_file injects the stable seed (.env: ECR, domains, ASSETS_BUCKET,
    # CLIENTS, DEFAULT_CLIENT) and the per-component manifest (versions.env: every
    # *_TAG, including each CLIENT_<NAME>_TAG the entrypoint pulls). Listing the
    # manifest here means a new client needs NO compose edit — only a versions.env
    # line + its name in CLIENTS.
    env_file:
      - .env
      - versions.env
    environment:
      PORT: "4000"
      ASSETS_DIR: /assets
      DEFAULT_CLIENT: ${DEFAULT_CLIENT:-protofast}
      NG_ALLOWED_HOSTS: "${CLIENT_ADMIN_DOMAIN:-admin.example.com},${CLIENT_PROTOFAST_DOMAIN:-protofast.example.com}"
      # Only Envoy reaches this host, so its forwarded headers are trustworthy.
      NG_TRUST_PROXY_HEADERS: "x-forwarded-for,x-forwarded-proto"
      # SSR (server-side) traces/logs go straight to the collector; browser-side
      # telemetry posts same-origin to /otlp, which Envoy routes to the collector.
      SERVER_OTEL_ENDPOINT: "http://otel-collector:4318"
      BROWSER_OTEL_ENDPOINT: "/otlp"
      # The AWS CLI in the entrypoint pulls client assets from S3 using the
      # instance profile. The box is dual-stack, so the CLI's defaults work: the
      # standard S3 endpoint over IPv4, and IMDS at 169.254.169.254. Reaching
      # IMDS from inside this container requires the instance's IMDS hop limit to
      # be >= 2 (set in infra/compute.tf). Only the region must be provided.
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}

  auth:
    image: ${ECR}/protofast-auth:${AUTH_TAG}
    restart: unless-stopped
    environment: &dotnet-env
      ASPNETCORE_ENVIRONMENT: Production
      # Serve h2c (HTTP/2 cleartext) so Envoy's http2 upstream and grpc_health_probe work.
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_KESTREL__ENDPOINTDEFAULTS__PROTOCOLS: Http2
      OTEL_EXPORTER_OTLP_ENDPOINT: *otel-grpc
    volumes:
      # Static grpc_health_probe binary installed on the host (deploy.sh),
      # bind-mounted in so the chiseled image needs no extra layer.
      - /usr/local/bin/grpc_health_probe:/usr/local/bin/grpc_health_probe:ro
    healthcheck: &grpc-health
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=localhost:8080"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  payments:
    image: ${ECR}/protofast-payments:${PAYMENTS_TAG}
    restart: unless-stopped
    environment: *dotnet-env
    volumes:
      - /usr/local/bin/grpc_health_probe:/usr/local/bin/grpc_health_probe:ro
    healthcheck: *grpc-health

  api:
    image: ${ECR}/protofast-api:${API_TAG}
    restart: unless-stopped
    environment: *dotnet-env
    volumes:
      - /usr/local/bin/grpc_health_probe:/usr/local/bin/grpc_health_probe:ro
    healthcheck: *grpc-health

  otel-collector:
    image: ${ECR}/protofast-otel-collector:${OTEL_TAG}
    restart: unless-stopped
    environment:
      OTLP_GRPC_PORT: "4317"
      OTLP_HTTP_PORT: "4318"
      # Forward everything to the Aspire Dashboard's OTLP ingest (internal network).
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      ASPIRE_API_KEY: ""
      ASPIRE_INSECURE: "true"
    depends_on:
      aspire-dashboard:
        condition: service_started

  aspire-dashboard:
    # Ephemeral, in-memory telemetry UI. Not published; reached via a CF
    # Access-gated tunnel hostname or SSM port-forward. Pinned like every other
    # component: ${ASPIRE_TAG} lives in versions.env (written by deploy.sh apply
    # aspire-dashboard=<tag>); the :-13 default keeps the ref valid for bootstrap
    # and local `compose up` before the manifest carries an ASPIRE_TAG line.
    image: mcr.microsoft.com/dotnet/aspire-dashboard:${ASPIRE_TAG:-13}
    restart: unless-stopped
    environment:
      # Internal-only: auth is enforced at the Cloudflare edge / SSM, not here.
      DASHBOARD__FRONTEND__AUTHMODE: Unsecured
      DASHBOARD__OTLP__AUTHMODE: Unsecured

secrets:
  tunnel-token:
    # Written root-only by cloud-init user_data.
    file: /opt/protofast/tunnel-token
