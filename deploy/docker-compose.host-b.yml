# Host B — SERVICES + STATE compose topology (two-instance restructure §3.2).
#
# Runs the three gRPC backends plus the new stateful tier: Keycloak (identity),
# Postgres (Keycloak's `keycloak` DB + auth's durable `auth` DB, on the
# persistent EBS volume at /mnt/pgdata), and Redis (in-memory session cache).
#
# Cross-host edges get PUBLISHED ports so Host A's Envoy can dial this host's
# private IP: auth 8080, payments 8081, api 8082, keycloak 8083. Same-host wiring
# stays name-based over this compose network (auth → redis/postgres/keycloak,
# keycloak → postgres). Redis/Postgres are NOT published (internal only). The
# self-referencing SG (infra §4.3) admits only the sibling instance on 8080-8083.
#
# Services export telemetry to Host A's otel-collector at ${HOST_A_IP}:4317.
#
# Local/CI use: docker compose -f docker-compose.host-b.yml --env-file .env --env-file versions.env config

# Shared .NET service env. Telemetry crosses to Host A's collector (private IP,
# SG-admitted). Kept generic so auth can merge its own connection strings on top
# without leaking them to payments/api.
x-dotnet-env: &dotnet-env
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_HTTP_PORTS: "8080"
  ASPNETCORE_KESTREL__ENDPOINTDEFAULTS__PROTOCOLS: Http2
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://${HOST_A_IP}:4317"

x-grpc-health: &grpc-health
  test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=localhost:8080"]
  interval: 10s
  timeout: 3s
  retries: 5
  start_period: 20s

services:
  auth:
    image: ${ECR}/protofast-auth:${AUTH_TAG}
    restart: unless-stopped
    # Cross-host gRPC ingress for Envoy on Host A (private IP : 8080).
    ports:
      - "8080:8080"
    # auth-only connection strings (prod equivalent of the Aspire references in
    # §2.2). The env-var NAMES are identical to what Aspire injects in dev so the
    # service code is environment-agnostic (§2.2 ↔ §3.2). Same-host wiring stays
    # name-based over this compose network. AUTH_DB_PASSWORD comes from .env
    # (seeded by cloud-init, kept in sync with the auth-db-password secret the
    # Postgres init script reads — §3.2).
    environment:
      <<: *dotnet-env
      ConnectionStrings__redis: "redis:6379"
      ConnectionStrings__auth: "Host=postgres;Port=5432;Database=auth;Username=auth;Password=${AUTH_DB_PASSWORD}"
      ConnectionStrings__keycloak: "http://keycloak:8080/realms/protofast"
      # Back-channel (in-cluster) vs browser-facing (public) Keycloak authorities — see auth §3.5.
      Auth_Keycloak__Authority: "http://keycloak:8080"
      Auth_Keycloak__PublicAuthority: "https://${KEYCLOAK_DOMAIN}"
      # Confidential-client secrets (same values the realm import receives). From the SM secret,
      # seeded into .env by deploy.sh ensure_secret_files.
      Auth_Keycloak__ClientSecretProtofastWeb: "${PROTOFAST_WEB_CLIENT_SECRET}"
      Auth_Keycloak__ClientSecretAdmin: "${ADMIN_CLIENT_SECRET}"
      # EC P-256 private key mounted as a root-only file (newlines don't fit env vars).
      Auth_InternalJwt__PrivateKeyPemFile: /run/secrets/auth-internal-jwt-key
      Auth_InternalJwt__KeyId: "${INTERNAL_JWT_KEY_ID:-prod-1}"
      # Host → realm/client map (config now, DB row later — auth §3.3).
      Tenants__ByHost__protofast.dev__Realm: protofast
      Tenants__ByHost__protofast.dev__ClientId: protofast-web
      Tenants__ByHost__admin.protofast.dev__Realm: protofast
      Tenants__ByHost__admin.protofast.dev__ClientId: admin
    volumes:
      - /usr/local/bin/grpc_health_probe:/usr/local/bin/grpc_health_probe:ro
    secrets:
      - auth-internal-jwt-key
    healthcheck: *grpc-health
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  # One-shot schema-migrations job (auth §3.5.3). profiles:["jobs"] keeps it out of `compose up`;
  # deploy.sh runs it via `compose run --rm auth-migrations` BEFORE recreating auth, and aborts the
  # auth apply on failure (fail-closed). restart:"no" so it exits.
  auth-migrations:
    image: ${ECR}/protofast-auth-migrations:${AUTH_MIGRATIONS_TAG}
    profiles: ["jobs"]
    restart: "no"
    environment:
      ASPNETCORE_ENVIRONMENT: Production          # hard-blocks --rebuild-schema
      ConnectionStrings__auth: "Host=postgres;Port=5432;Database=auth;Username=auth;Password=${AUTH_DB_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy

  payments:
    image: ${ECR}/protofast-payments:${PAYMENTS_TAG}
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      <<: *dotnet-env
      # Verify the internal JWT with the public key only (auth §6).
      Shared_InternalJwt__PublicKeyPemFile: /run/secrets/internal-jwt-pub
    volumes:
      - /usr/local/bin/grpc_health_probe:/usr/local/bin/grpc_health_probe:ro
    secrets:
      - internal-jwt-pub
    healthcheck: *grpc-health

  api:
    image: ${ECR}/protofast-api:${API_TAG}
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      <<: *dotnet-env
      # Verify the internal JWT with the public key only (auth §6).
      Shared_InternalJwt__PublicKeyPemFile: /run/secrets/internal-jwt-pub
    volumes:
      - /usr/local/bin/grpc_health_probe:/usr/local/bin/grpc_health_probe:ro
    secrets:
      - internal-jwt-pub
    healthcheck: *grpc-health

  postgres:
    # Pinned upstream image via POSTGRES_TAG (versions.env). Major-version bumps
    # are migrations, not deploys — see deploy.sh stateful path (§5.3).
    image: postgres:${POSTGRES_TAG:-17}
    restart: unless-stopped
    stop_grace_period: 60s              # the image STOPSIGNAL is SIGINT (fast shutdown)
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD_FILE: /run/secrets/kc-db-password
      # EBS mount point root holds a lost+found dir, so initdb can't use it
      # directly. Put the cluster in a subdir the entrypoint creates/chowns.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /mnt/pgdata:/var/lib/postgresql/data            # persistent EBS (infra §4.2)
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro  # creates `auth` DB + auth role (first init only)
    secrets:
      - kc-db-password
      - auth-db-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_TAG:-26.6}
    restart: unless-stopped
    # Keycloak does NOT support the `_FILE` secret convention (unlike the Postgres
    # image), so read the Docker secret into KC_DB_PASSWORD here before exec'ing
    # kc.sh. `$$` escapes compose interpolation so the shell sees a literal `$(...)`.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - 'export KC_DB_PASSWORD="$$(cat /run/secrets/kc-db-password)"; exec /opt/keycloak/bin/kc.sh start --import-realm'
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_HOSTNAME: ${KEYCLOAK_DOMAIN:-auth.example.com}
      KC_PROXY_HEADERS: xforwarded          # behind Envoy on Host A
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"             # /health/ready for the deploy gate
      # Export Keycloak's logs to Host A's otel-collector (same receiver the .NET
      # services use). opentelemetry-logs is a Preview feature (Keycloak >= 26.5),
      # so it must be listed in KC_FEATURES before the telemetry-logs options apply.
      KC_FEATURES: opentelemetry-logs
      KC_TELEMETRY_LOGS_ENABLED: "true"
      KC_TELEMETRY_LOGS_PROTOCOL: grpc
      KC_TELEMETRY_LOGS_ENDPOINT: "http://${HOST_A_IP}:4317"
      # Export Keycloak server spans to the same otel-collector as its logs. Tracing is a
      # supported (non-preview) feature in Keycloak 26, so it needs no KC_FEATURES entry.
      # parentbased_always_on keeps the auth service's back-channel token/JWKS calls (which
      # arrive carrying a traceparent) on the same trace as the sign-in flow.
      KC_TRACING_ENABLED: "true"
      KC_TRACING_PROTOCOL: grpc
      KC_TRACING_SAMPLER_TYPE: parentbased_always_on
      KC_TRACING_ENDPOINT: "http://${HOST_A_IP}:4317"
      # Suppress embedded-Infinispan cache spans (named after the cache, e.g.
      # OFFLINE_USER_SESSION / OFFLINE_CLIENT_SESSION). These come from background
      # session-persistence tasks that aren't tied to an incoming request, so they're
      # just noise here. Keeps the request-scoped auth/sign-in spans intact.
      KC_TRACING_INFINISPAN_ENABLED: "false"
      # Realm-import placeholder substitution (realm JSON uses ${env.*}). Non-KC_ names so Keycloak
      # doesn't reject them as unknown config options. Secrets seeded into .env by deploy.sh.
      # The substitution only runs when replace-placeholders is enabled; without it Keycloak
      # imports the literal ${env.*:default} fallbacks (e.g. SMTP localhost:1025).
      JAVA_OPTS_APPEND: "-Dkeycloak.migration.replace-placeholders=true"
      PROTOFAST_WEB_CLIENT_SECRET: "${PROTOFAST_WEB_CLIENT_SECRET}"
      ADMIN_CLIENT_SECRET: "${ADMIN_CLIENT_SECRET}"
      # Client "Home URL" (client.baseUrl) — where the login-page brand link returns the
      # user. Overrides the realm import's dev-localhost default with the public app domains.
      PROTOFAST_WEB_BASE_URL: "${PROTOFAST_WEB_BASE_URL:-https://protofast.dev}"
      ADMIN_BASE_URL: "${ADMIN_BASE_URL:-https://admin.protofast.dev}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_FROM: "${SMTP_FROM:-no-reply@protofast.dev}"
      SMTP_AUTH: "${SMTP_AUTH:-true}"
      SMTP_STARTTLS: "${SMTP_STARTTLS:-true}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
      # Custom "protofast" login theme (realm import sets loginTheme: protofast).
      - ./keycloak/themes:/opt/keycloak/themes:ro
    # Cross-host HTTP ingress for Envoy's Keycloak edge vhost (private IP : 8083).
    ports:
      - "8083:8080"
    secrets:
      - kc-db-password
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:${REDIS_TAG:-7}
    restart: unless-stopped
    # In-memory only (D3): no AOF, no volume. Bounded memory + TTL eviction so a
    # restart just causes cache misses that repopulate from the auth DB.
    command: redis-server --maxmemory 256mb --maxmemory-policy volatile-ttl

secrets:
  kc-db-password:
    file: /opt/protofast/kc-db-password       # root-only, seeded by cloud-init
  auth-db-password:
    file: /opt/protofast/auth-db-password  # root-only, seeded by cloud-init
  auth-internal-jwt-key:
    file: /opt/protofast/auth-internal-jwt-key   # EC P-256 PRIVATE key (auth-svc only); seeded by deploy.sh
  internal-jwt-pub:
    file: /opt/protofast/internal-jwt-pub        # EC P-256 PUBLIC key (api/payments); seeded by deploy.sh
