parent=base
import=common/keycloak

# Only our own stylesheet — no PatternFly. The templates below use these
# semantic class names, mapped here so inherited base pages (reset password,
# update password, OTP, verify email, error/info) also pick up our styling.
styles=css/styles.css

kcHtmlClass=pf-html
kcBodyClass=pf-body
kcLoginClass=pf-login

kcHeaderClass=pf-header
kcHeaderWrapperClass=pf-header-wrapper

kcFormCardClass=pf-card
kcContentWrapperClass=pf-content

kcFormClass=pf-form
kcFormGroupClass=pf-group
kcFormGroupErrorClass=pf-group--error
kcLabelClass=pf-label
kcLabelWrapperClass=pf-label-wrapper
kcInputClass=pf-input
kcInputWrapperClass=pf-input-wrapper
kcInputErrorMessageClass=pf-field-error
kcInputHelperTextClass=pf-helper

kcFormOptionsClass=pf-options
kcFormButtonsClass=pf-buttons
kcFormSettingClass=pf-setting

kcButtonClass=pf-btn
kcButtonPrimaryClass=pf-btn--primary
kcButtonDefaultClass=pf-btn--default
kcButtonLargeClass=pf-btn--large
kcButtonBlockClass=pf-btn--block

kcFormSocialAccountListClass=pf-social
kcFormSocialAccountListButtonClass=pf-btn pf-btn--default pf-btn--block
kcFormSocialAccountNameClass=pf-social-name

kcInfoAreaWrapperClass=pf-info
kcAlertClass=pf-alert
kcAlertTitleClass=pf-alert-title

kcCheckboxInputClass=pf-checkbox
