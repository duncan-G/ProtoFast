<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Temporarily unavailable</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #1e293b;
        --border: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        background:
          radial-gradient(1200px 600px at 50% -10%, rgba(56, 189, 248, 0.12), transparent 60%),
          var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 480px;
        padding: 40px 36px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        text-align: center;
      }
      .icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 24px;
        color: var(--accent);
      }
      .icon svg { width: 100%; height: 100%; display: block; }
      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
        font-weight: 650;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 auto 28px;
        max-width: 36ch;
        color: var(--muted);
        font-size: 1rem;
      }
      .actions {
        display: flex;
        justify-content: center;
      }
      button {
        appearance: none;
        cursor: pointer;
        border: 0;
        border-radius: 10px;
        padding: 11px 22px;
        font: inherit;
        font-weight: 600;
        color: #0b1220;
        background: var(--accent);
        transition: filter 0.15s ease, transform 0.05s ease;
      }
      button:hover { filter: brightness(1.05); }
      button:active { transform: translateY(1px); }
      .meta {
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        font-size: 0.8rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card" role="alert" aria-live="polite">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 9v4" />
          <path d="M12 17h.01" />
          <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" />
        </svg>
      </div>
      <h1>We&rsquo;ll be right back</h1>
      <p>
        One of our services is briefly unreachable. This is usually temporary —
        please try again in a moment.
      </p>
      <div class="actions">
        <button type="button" onclick="location.reload()">Retry</button>
      </div>
      <div class="meta">If the problem persists, please contact support.</div>
    </main>
  </body>
</html>
