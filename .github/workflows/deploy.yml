# Repo VARIABLES (set by infra/bootstrap): AWS_REGION, AWS_DEPLOY_ROLE_ARN, ECR_REGISTRY.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to (re)deploy — defaults to the triggering commit. Use to roll back to an older known-good SHA."
        required: false
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # GitHub OIDC → AWS

env:
  TAG: ${{ inputs.sha || github.sha }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR: ${{ vars.ECR_REGISTRY }}
  ARCH: arm64 # matches the t4g (ARM) instance
  INSTANCE_TAG_KEY: "protofast:role"
  INSTANCE_TAG_VALUE: "app-server"
  # On-host binaries the IPv6-only instance can't curl from IPv4-only github.com.
  # Downloaded here (the runner has IPv4) and shipped via the ECR dualstack
  # endpoint in the protofast-tools image; deploy.sh extracts them on the box.
  DOCKER_COMPOSE_VERSION: "2.39.4"
  GRPC_HEALTH_PROBE_VERSION: "0.4.34"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: dotnet test
        run: dotnet test ProtoFast.slnx -c Release

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: client unit tests
        # Angular's vitest-backed `ng test` runs in Node (no browser). generate:grpc
        # first since the test script (unlike build) doesn't run buf codegen.
        run: |
          for client in admin protofast; do
            ( cd "clients/$client" && npm ci && npm run generate:grpc && npm test -- --watch=false )
          done

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # ECR tags are immutable, so re-running for an already-built commit would
      # fail on push. Since the tag is the commit SHA, an existing image was
      # built from identical source — check per-repo and skip what's present so
      # re-runs are idempotent.
      - name: Check which images already exist
        id: exists
        run: |
          set -euo pipefail
          check() {
            aws ecr describe-images --repository-name "$1" \
              --image-ids imageTag="${TAG}" >/dev/null 2>&1 \
              && echo "true" || echo "false"
          }
          echo "envoy=$(check protofast-envoy)"               >> "$GITHUB_OUTPUT"
          echo "clients_host=$(check protofast-clients-host)" >> "$GITHUB_OUTPUT"
          echo "otel=$(check protofast-otel-collector)"       >> "$GITHUB_OUTPUT"
          echo "tools=$(check protofast-tools)"               >> "$GITHUB_OUTPUT"

      # --- container images via Buildx (arm64) ---
      - name: Build & push envoy
        if: steps.exists.outputs.envoy == 'false'
        uses: docker/build-push-action@v7
        with:
          context: ./proxy
          platforms: linux/${{ env.ARCH }}
          push: true
          tags: ${{ env.ECR }}/protofast-envoy:${{ env.TAG }}

      - name: Build & push clients-host (repo-root context)
        if: steps.exists.outputs.clients_host == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: clients/host/Dockerfile
          platforms: linux/${{ env.ARCH }}
          push: true
          tags: ${{ env.ECR }}/protofast-clients-host:${{ env.TAG }}

      - name: Build & push otel-collector
        if: steps.exists.outputs.otel == 'false'
        uses: docker/build-push-action@v7
        with:
          context: ./otel-collector
          platforms: linux/${{ env.ARCH }}
          push: true
          tags: ${{ env.ECR }}/protofast-otel-collector:${{ env.TAG }}

      # On-host tools bundle (docker compose plugin + grpc_health_probe). The
      # instance is IPv6-only and can't reach IPv4-only github.com, so we fetch
      # the binaries here (the runner has IPv4) and ship them in an image the box
      # pulls over the ECR dualstack endpoint. deploy.sh cp's them onto the host.
      - name: Build & push tools bundle
        if: steps.exists.outputs.tools == 'false'
        run: |
          set -euo pipefail
          # Compose release assets use aarch64/x86_64; grpc_health_probe uses arm64/amd64.
          case "${ARCH}" in
            arm64) compose_arch=aarch64; probe_arch=arm64 ;;
            amd64) compose_arch=x86_64;  probe_arch=amd64 ;;
            *) echo "unsupported ARCH=${ARCH}" >&2; exit 1 ;;
          esac
          ctx="$(mktemp -d)"
          curl -fsSL -o "${ctx}/docker-compose" \
            "https://github.com/docker/compose/releases/download/v${DOCKER_COMPOSE_VERSION}/docker-compose-linux-${compose_arch}"
          curl -fsSL -o "${ctx}/grpc_health_probe" \
            "https://github.com/grpc-ecosystem/grpc-health-probe/releases/download/v${GRPC_HEALTH_PROBE_VERSION}/grpc_health_probe-linux-${probe_arch}"
          chmod +x "${ctx}/docker-compose" "${ctx}/grpc_health_probe"
          cp deploy/tools/Dockerfile "${ctx}/Dockerfile"
          docker buildx build --platform "linux/${ARCH}" --push \
            -t "${ECR}/protofast-tools:${TAG}" "${ctx}"

      # --- .NET services via the SDK container publish (pushes directly to ECR) ---
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Build & push .NET services
        run: |
          set -euo pipefail
          for svc in \
            "auth:services/auth/src/ProtoFast.Auth.Api" \
            "payments:services/payments/src/ProtoFast.Payments.Api" \
            "api:services/api/src/ProtoFast.Api"; do
            name="${svc%%:*}"; path="${svc##*:}"
            if aws ecr describe-images --repository-name "protofast-${name}" \
                 --image-ids imageTag="${TAG}" >/dev/null 2>&1; then
              echo "protofast-${name}:${TAG} already exists, skipping"; continue
            fi
            dotnet publish "$path" -c Release /t:PublishContainer \
              -p ContainerRegistry="${ECR}" \
              -p ContainerRepository="protofast-${name}" \
              -p ContainerImageTag="${TAG}" \
              -p ContainerRuntimeIdentifier="linux-${ARCH}"
          done

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # NOTE: deliberately NO `environment:` here. Setting one changes the GitHub
    # OIDC `sub` to `repo:O/R:environment:<name>`, which would not match the
    # protofast-deploy role's trust (`...:ref:refs/heads/main`). Release authority
    # is governed on the GitHub side via branch protection on main and who may run
    # workflow_dispatch
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve target instance
        id: target
        run: |
          set -euo pipefail
          id=$(aws ec2 describe-instances \
            --filters "Name=tag:${INSTANCE_TAG_KEY},Values=${INSTANCE_TAG_VALUE}" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          [ -n "$id" ] || { echo "no running instance with ${INSTANCE_TAG_KEY}=${INSTANCE_TAG_VALUE}" >&2; exit 1; }
          echo "instance_id=$id" >> "$GITHUB_OUTPUT"

      # Ship the compose file + deploy script to the instance and run deploy.sh.
      # SSM Run Command — no SSH, no inbound ports.
      - name: Deploy via SSM
        run: |
          set -euo pipefail
          COMPOSE_B64=$(base64 -w0 deploy/docker-compose.yml)
          DEPLOY_B64=$(base64 -w0 deploy/deploy.sh)

          cmd_id=$(aws ssm send-command \
            --instance-ids "${{ steps.target.outputs.instance_id }}" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${TAG}" \
            --parameters commands="[
              \"set -eu\",
              \"mkdir -p /opt/protofast\",
              \"echo $COMPOSE_B64 | base64 -d > /opt/protofast/docker-compose.yml\",
              \"echo $DEPLOY_B64 | base64 -d > /opt/protofast/deploy.sh\",
              \"chmod +x /opt/protofast/deploy.sh\",
              \"ECR=${ECR} /opt/protofast/deploy.sh ${TAG}\"
            ]" \
            --query 'Command.CommandId' --output text)

          echo "SSM command: $cmd_id"

          # Poll until terminal; surface the on-instance output and fail loudly.
          while :; do
            status=$(aws ssm get-command-invocation \
              --command-id "$cmd_id" \
              --instance-id "${{ steps.target.outputs.instance_id }}" \
              --query 'Status' --output text 2>/dev/null || echo Pending)
            case "$status" in
              Success) break ;;
              Failed|Cancelled|TimedOut) echo "deploy $status"; break ;;
              *) sleep 8 ;;
            esac
          done

          aws ssm get-command-invocation \
            --command-id "$cmd_id" \
            --instance-id "${{ steps.target.outputs.instance_id }}" \
            --query '{Status:Status,Out:StandardOutputContent,Err:StandardErrorContent}' \
            --output text

          [ "$status" = "Success" ]
