# Deploy Postgres (Keycloak's `keycloak` DB + auth's `auth` DB, on the durable
# pgdata EBS volume, Host B). Upstream pinned image (postgres:<tag>), not an
# artifact we build â€” so this does NOT use _component-deploy.yml. It ships the
# Host B compose + deploy.sh and runs `deploy.sh apply postgres=<tag>`, which takes
# the stateful path (Â§5.3): plain `up -d --no-deps`, health-gated on pg_isready,
# and â€” critically â€” NEVER auto-rolls-back a Postgres tag (a downgrade after a
# catalog upgrade corrupts data).
#
# MINOR/patch bumps within a major version deploy normally. A MAJOR-version bump is
# a MIGRATION, not a deploy: deploy.sh refuses it unless ALLOW_PG_MAJOR=1, which
# this workflow sets only when the `allow_major` dispatch input is true. Take a
# pg_dump backup first.
#
# Repo VARIABLES (set by infra/bootstrap): AWS_REGION, AWS_DEPLOY_ROLE_ARN,
#   ECR_REGISTRY, ASSETS_BUCKET.
name: deploy-postgres

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-postgres.yml"
      - "deploy/docker-compose.host-b.yml"
      - "deploy/postgres/**"
      - "deploy/deploy.sh"
  workflow_dispatch:
    inputs:
      tag:
        description: "postgres image tag to deploy or roll back to. Blank = default."
        required: false
        type: string
      allow_major:
        description: "Permit a major-version bump (a migration). Only set after a pg_dump backup (Â§6.3)."
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-postgres
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # GitHub OIDC -> AWS

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR: ${{ vars.ECR_REGISTRY }}
  ASSETS_BUCKET: ${{ vars.ASSETS_BUCKET }}
  INSTANCE_TAG_KEY: "protofast:role"
  INSTANCE_TAG_VALUE: "app-server"
  DEFAULT_POSTGRES_TAG: "17"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          [ -n "$tag" ] || tag="${DEFAULT_POSTGRES_TAG}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "deploying postgres tag=${tag} (allow_major=${{ inputs.allow_major }})"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve target instance
        id: target
        run: |
          set -euo pipefail
          # postgres is a services component (Host B): scope to the Role=services sibling.
          id=$(aws ec2 describe-instances \
            --filters "Name=tag:${INSTANCE_TAG_KEY},Values=${INSTANCE_TAG_VALUE}" \
                      "Name=tag:Role,Values=services" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          [ -n "$id" ] || { echo "no running services instance with ${INSTANCE_TAG_KEY}=${INSTANCE_TAG_VALUE}" >&2; exit 1; }
          echo "instance_id=$id" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSM
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          # ALLOW_PG_MAJOR is read by deploy.sh's stateful apply (Â§5.3).
          ALLOW_PG_MAJOR: ${{ inputs.allow_major && '1' || '0' }}
          # Stream the command's full stdout/stderr to CloudWatch Logs. This is the
          # UNCAPPED record: get-command-invocation's StandardOutputContent /
          # StandardErrorContent are truncated to 2500 chars each, which drops the
          # real failing line for a verbose apply. The instance role's
          # AmazonSSMManagedInstanceCore already grants the logs:Put* SSM needs, and
          # the deploy role's ReadLogs statement (infra/bootstrap/roles.tf) reads it back.
          LOG_GROUP: /protofast/deploy
        run: |
          set -euo pipefail
          COMPOSE_B64=$(base64 -w0 deploy/docker-compose.host-b.yml)
          DEPLOY_B64=$(base64 -w0 deploy/deploy.sh)

          cmd_id=$(aws ssm send-command \
            --instance-ids "${{ steps.target.outputs.instance_id }}" \
            --document-name AWS-RunShellScript \
            --comment "deploy postgres=${TAG}" \
            --cloud-watch-output-config "CloudWatchLogGroupName=${LOG_GROUP},CloudWatchOutputEnabled=true" \
            --parameters commands="[
              \"set -eu\",
              \"mkdir -p /opt/protofast\",
              \"echo $COMPOSE_B64 | base64 -d > /opt/protofast/docker-compose.yml\",
              \"echo $DEPLOY_B64 | base64 -d > /opt/protofast/deploy.sh\",
              \"chmod +x /opt/protofast/deploy.sh\",
              \"ECR=${ECR} ALLOW_PG_MAJOR=${ALLOW_PG_MAJOR} /opt/protofast/deploy.sh apply postgres=${TAG}\"
            ]" \
            --query 'Command.CommandId' --output text)

          echo "SSM command: $cmd_id"

          while :; do
            status=$(aws ssm get-command-invocation \
              --command-id "$cmd_id" \
              --instance-id "${{ steps.target.outputs.instance_id }}" \
              --query 'Status' --output text 2>/dev/null || echo Pending)
            case "$status" in
              Success) break ;;
              Failed|Cancelled|TimedOut) echo "deploy $status"; break ;;
              *) sleep 8 ;;
            esac
          done

          aws ssm get-command-invocation \
            --command-id "$cmd_id" \
            --instance-id "${{ steps.target.outputs.instance_id }}" \
            --query '{Status:Status,Out:StandardOutputContent,Err:StandardErrorContent}' \
            --output text

          # On any non-success, dump the FULL stdout+stderr from CloudWatch (uncapped)
          # so the real failing line is always in the Actions log rather than the
          # truncated inline view. Retry briefly: SSM flushes to CloudWatch around
          # the time the invocation goes terminal.
          if [ "$status" != Success ]; then
            echo "::group::Full deploy output (CloudWatch ${LOG_GROUP})"
            for attempt in 1 2 3 4 5; do
              events=$(aws logs filter-log-events \
                --log-group-name "$LOG_GROUP" \
                --log-stream-name-prefix "${cmd_id}/${{ steps.target.outputs.instance_id }}" \
                --output json 2>/dev/null | jq -r '.events[].message' 2>/dev/null || true)
              if [ -n "$events" ]; then
                printf '%s\n' "$events"
                break
              fi
              echo "(waiting for CloudWatch to flushâ€¦ attempt ${attempt}/5)"
              sleep 5
            done
            echo "::endgroup::"
          fi

          [ "$status" = "Success" ]

      # Publish the Host B compose + deploy.sh so a replaced Host B self-bootstraps.
      - name: Publish deploy artifacts to S3
        run: |
          set -euo pipefail
          aws s3 cp deploy/docker-compose.host-b.yml "s3://${ASSETS_BUCKET}/deploy/docker-compose.host-b.yml"
          aws s3 cp deploy/deploy.sh                 "s3://${ASSETS_BUCKET}/deploy/deploy.sh"
          aws s3 cp deploy/postgres/backup.sh        "s3://${ASSETS_BUCKET}/deploy/backup.sh"
