# Deploy Postgres (Keycloak's `keycloak` DB + auth's `sessions` DB, on the durable
# pgdata EBS volume, Host B). Upstream pinned image (postgres:<tag>), not an
# artifact we build — so this does NOT use _component-deploy.yml. It ships the
# Host B compose + deploy.sh and runs `deploy.sh apply postgres=<tag>`, which takes
# the stateful path (§5.3): plain `up -d --no-deps`, health-gated on pg_isready,
# and — critically — NEVER auto-rolls-back a Postgres tag (a downgrade after a
# catalog upgrade corrupts data).
#
# MINOR/patch bumps within a major version deploy normally. A MAJOR-version bump is
# a MIGRATION, not a deploy: deploy.sh refuses it unless ALLOW_PG_MAJOR=1, which
# this workflow sets only when the `allow_major` dispatch input is true. Take a
# pg_dump backup first (§6.3).
#
# Repo VARIABLES (set by infra/bootstrap): AWS_REGION, AWS_DEPLOY_ROLE_ARN,
#   ECR_REGISTRY, ASSETS_BUCKET.
name: deploy-postgres

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-postgres.yml"
      - "deploy/docker-compose.host-b.yml"
      - "deploy/postgres/**"
      - "deploy/deploy.sh"
  workflow_dispatch:
    inputs:
      tag:
        description: "postgres image tag to deploy or roll back to. Blank = default."
        required: false
        type: string
      allow_major:
        description: "Permit a major-version bump (a migration). Only set after a pg_dump backup (§6.3)."
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-postgres
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # GitHub OIDC -> AWS

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR: ${{ vars.ECR_REGISTRY }}
  ASSETS_BUCKET: ${{ vars.ASSETS_BUCKET }}
  INSTANCE_TAG_KEY: "protofast:role"
  INSTANCE_TAG_VALUE: "app-server"
  # Keep in sync with the POSTGRES_TAG default in deploy/docker-compose.host-b.yml.
  DEFAULT_POSTGRES_TAG: "17"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          [ -n "$tag" ] || tag="${DEFAULT_POSTGRES_TAG}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "deploying postgres tag=${tag} (allow_major=${{ inputs.allow_major }})"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve target instance
        id: target
        run: |
          set -euo pipefail
          # postgres is a services component (Host B): scope to the Role=services sibling.
          id=$(aws ec2 describe-instances \
            --filters "Name=tag:${INSTANCE_TAG_KEY},Values=${INSTANCE_TAG_VALUE}" \
                      "Name=tag:Role,Values=services" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          [ -n "$id" ] || { echo "no running services instance with ${INSTANCE_TAG_KEY}=${INSTANCE_TAG_VALUE}" >&2; exit 1; }
          echo "instance_id=$id" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSM
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          # ALLOW_PG_MAJOR is read by deploy.sh's stateful apply (§5.3).
          ALLOW_PG_MAJOR: ${{ inputs.allow_major && '1' || '0' }}
        run: |
          set -euo pipefail
          COMPOSE_B64=$(base64 -w0 deploy/docker-compose.host-b.yml)
          DEPLOY_B64=$(base64 -w0 deploy/deploy.sh)

          cmd_id=$(aws ssm send-command \
            --instance-ids "${{ steps.target.outputs.instance_id }}" \
            --document-name AWS-RunShellScript \
            --comment "deploy postgres=${TAG}" \
            --parameters commands="[
              \"set -eu\",
              \"mkdir -p /opt/protofast\",
              \"echo $COMPOSE_B64 | base64 -d > /opt/protofast/docker-compose.yml\",
              \"echo $DEPLOY_B64 | base64 -d > /opt/protofast/deploy.sh\",
              \"chmod +x /opt/protofast/deploy.sh\",
              \"ECR=${ECR} ALLOW_PG_MAJOR=${ALLOW_PG_MAJOR} /opt/protofast/deploy.sh apply postgres=${TAG}\"
            ]" \
            --query 'Command.CommandId' --output text)

          echo "SSM command: $cmd_id"

          while :; do
            status=$(aws ssm get-command-invocation \
              --command-id "$cmd_id" \
              --instance-id "${{ steps.target.outputs.instance_id }}" \
              --query 'Status' --output text 2>/dev/null || echo Pending)
            case "$status" in
              Success) break ;;
              Failed|Cancelled|TimedOut) echo "deploy $status"; break ;;
              *) sleep 8 ;;
            esac
          done

          aws ssm get-command-invocation \
            --command-id "$cmd_id" \
            --instance-id "${{ steps.target.outputs.instance_id }}" \
            --query '{Status:Status,Out:StandardOutputContent,Err:StandardErrorContent}' \
            --output text

          [ "$status" = "Success" ]

      # Publish the Host B compose + deploy.sh so a replaced Host B self-bootstraps.
      - name: Publish deploy artifacts to S3
        run: |
          set -euo pipefail
          aws s3 cp deploy/docker-compose.host-b.yml "s3://${ASSETS_BUCKET}/deploy/docker-compose.host-b.yml"
          aws s3 cp deploy/deploy.sh                 "s3://${ASSETS_BUCKET}/deploy/deploy.sh"
          aws s3 cp deploy/postgres/backup.sh        "s3://${ASSETS_BUCKET}/deploy/backup.sh"
