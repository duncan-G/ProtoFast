name: deploy-envoy

on:
  push:
    branches: [main]
    paths:
      - "proxy/**"
      - ".github/workflows/deploy-envoy.yml"
      - ".github/workflows/_component-deploy.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing artifact tag to (re)deploy or roll back to. Blank = build current source."
        required: false
        type: string

concurrency:
  group: deploy-envoy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/_component-deploy.yml
    with:
      component: envoy
      host: edge
      build: buildx
      target: protofast-envoy
      kind: service
      hash_paths: "proxy"
      project: ./proxy
      tag: ${{ inputs.tag }}
    secrets: inherit
