# Deploy Redis (auth's in-memory session cache, Host B). Like cloudflared/aspire
# it's an upstream pinned image (redis:<tag>), not an artifact we build — so this
# does NOT use _component-deploy.yml. It ships the Host B compose + deploy.sh and
# runs `deploy.sh apply redis=<tag>`, which takes the stateful path (§5.3): plain
# `up -d --no-deps`, health-gated on a redis-cli PING. Redis is a disposable cache
# (D3), so a recreate just causes cache misses that repopulate from the auth DB.
#
# Repo VARIABLES (set by infra/bootstrap): AWS_REGION, AWS_DEPLOY_ROLE_ARN,
#   ECR_REGISTRY, ASSETS_BUCKET.
name: deploy-redis

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-redis.yml"
      - "deploy/docker-compose.host-b.yml"
      - "deploy/deploy.sh"
  workflow_dispatch:
    inputs:
      tag:
        description: "redis image tag to deploy or roll back to. Blank = default."
        required: false
        type: string

concurrency:
  group: deploy-redis
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # GitHub OIDC -> AWS

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR: ${{ vars.ECR_REGISTRY }}
  ASSETS_BUCKET: ${{ vars.ASSETS_BUCKET }}
  INSTANCE_TAG_KEY: "protofast:role"
  INSTANCE_TAG_VALUE: "app-server"
  # Keep in sync with the REDIS_TAG default in deploy/docker-compose.host-b.yml.
  DEFAULT_REDIS_TAG: "7"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          [ -n "$tag" ] || tag="${DEFAULT_REDIS_TAG}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "deploying redis tag=${tag}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve target instance
        id: target
        run: |
          set -euo pipefail
          # redis is a services component (Host B): scope to the Role=services sibling.
          id=$(aws ec2 describe-instances \
            --filters "Name=tag:${INSTANCE_TAG_KEY},Values=${INSTANCE_TAG_VALUE}" \
                      "Name=tag:Role,Values=services" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          [ -n "$id" ] || { echo "no running services instance with ${INSTANCE_TAG_KEY}=${INSTANCE_TAG_VALUE}" >&2; exit 1; }
          echo "instance_id=$id" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSM
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          # Stream the command's full stdout/stderr to CloudWatch Logs. This is the
          # UNCAPPED record: get-command-invocation returns only the first ~24,000
          # chars of stdout and ~8,000 of stderr, which can still drop the real
          # failing line of a verbose apply. The instance role's dedicated
          # protofast-instance-ssm-logs policy (infra/iam.tf) grants the
          # logs:Create*/Put* the agent needs — AmazonSSMManagedInstanceCore does NOT —
          # and the deploy role's ReadLogs statement (infra/bootstrap/roles.tf) reads it back.
          LOG_GROUP: /protofast/deploy
        run: |
          set -euo pipefail
          COMPOSE_B64=$(base64 -w0 deploy/docker-compose.host-b.yml)
          DEPLOY_B64=$(base64 -w0 deploy/deploy.sh)

          cmd_id=$(aws ssm send-command \
            --instance-ids "${{ steps.target.outputs.instance_id }}" \
            --document-name AWS-RunShellScript \
            --comment "deploy redis=${TAG}" \
            --cloud-watch-output-config "CloudWatchLogGroupName=${LOG_GROUP},CloudWatchOutputEnabled=true" \
            --parameters commands="[
              \"set -eu\",
              \"mkdir -p /opt/protofast\",
              \"echo $COMPOSE_B64 | base64 -d > /opt/protofast/docker-compose.yml\",
              \"echo $DEPLOY_B64 | base64 -d > /opt/protofast/deploy.sh\",
              \"chmod +x /opt/protofast/deploy.sh\",
              \"ECR=${ECR} /opt/protofast/deploy.sh apply redis=${TAG}\"
            ]" \
            --query 'Command.CommandId' --output text)

          echo "SSM command: $cmd_id"

          # Poll until the invocation reaches a terminal state.
          while :; do
            status=$(aws ssm get-command-invocation \
              --command-id "$cmd_id" \
              --instance-id "${{ steps.target.outputs.instance_id }}" \
              --query 'Status' --output text 2>/dev/null || echo Pending)
            case "$status" in
              Success) break ;;
              Failed|Cancelled|TimedOut) echo "deploy $status"; break ;;
              *) sleep 8 ;;
            esac
          done

          # Inline view. get-command-invocation returns up to ~24,000 chars of stdout
          # and ~8,000 of stderr — enough for most applies — but the old
          # `--query '{Out,Err}' --output text` TAB-joined both streams into a single
          # unlabelled blob, so the only thing that stood out was SSM's own wrapper
          # line ("failed to run commands: exit status 1"). Print each stream on its
          # own, labelled, so deploy.sh's log lines are visible without CloudWatch.
          inv=$(aws ssm get-command-invocation \
            --command-id "$cmd_id" \
            --instance-id "${{ steps.target.outputs.instance_id }}" \
            --output json 2>/dev/null || echo '{}')
          echo "deploy status: $(jq -r '.Status // "unknown"' <<<"$inv") (exit $(jq -r '.ResponseCode // "?"' <<<"$inv"); $(jq -r '.StatusDetails // ""' <<<"$inv"))"
          echo "::group::deploy stdout (inline, capped ~24k)"
          jq -r '.StandardOutputContent // ""' <<<"$inv"
          echo "::endgroup::"
          echo "::group::deploy stderr (inline, capped ~8k)"
          jq -r '.StandardErrorContent // ""' <<<"$inv"
          echo "::endgroup::"

          # On non-success, dump the FULL, uncapped output from CloudWatch. The SSM
          # agent uploads a stream only every ~30s (or at 200KB) — so a FAST failure
          # is usually NOT in CloudWatch yet when the invocation goes terminal; the
          # old 25s wait routinely gave up first, leaving just the wrapper line. Poll
          # ~90s to clear the flush interval, and SURFACE retrieval errors instead of
          # swallowing them, so an empty dump is diagnosable (permissions vs. not-yet-flushed).
          if [ "$status" != Success ]; then
            echo "::group::Full deploy output (CloudWatch ${LOG_GROUP})"
            found=""
            for attempt in $(seq 1 18); do
              if resp=$(aws logs filter-log-events \
                    --log-group-name "$LOG_GROUP" \
                    --log-stream-name-prefix "${cmd_id}/${{ steps.target.outputs.instance_id }}" \
                    --output json 2>&1); then
                events=$(jq -r '.events[].message' <<<"$resp" 2>/dev/null || true)
                if [ -n "$events" ]; then printf '%s\n' "$events"; found=1; break; fi
              else
                echo "(filter-log-events: $resp)"
              fi
              echo "(waiting for CloudWatch to flush… attempt ${attempt}/18)"
              sleep 5
            done
            [ -n "$found" ] || echo "No CloudWatch events under ${cmd_id}/${{ steps.target.outputs.instance_id }} in ${LOG_GROUP} after ~90s."
            echo "::endgroup::"
          fi

          [ "$status" = "Success" ]

      # Publish the Host B compose + deploy.sh so a replaced Host B self-bootstraps.
      - name: Publish deploy artifacts to S3
        run: |
          set -euo pipefail
          aws s3 cp deploy/docker-compose.host-b.yml "s3://${ASSETS_BUCKET}/deploy/docker-compose.host-b.yml"
          aws s3 cp deploy/deploy.sh                 "s3://${ASSETS_BUCKET}/deploy/deploy.sh"
          aws s3 cp deploy/postgres/backup.sh        "s3://${ASSETS_BUCKET}/deploy/backup.sh"
