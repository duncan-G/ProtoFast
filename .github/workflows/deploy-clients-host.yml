name: deploy-clients-host

on:
  push:
    branches: [main]
    paths:
      - "clients/host/**"
      - ".github/workflows/deploy-clients-host.yml"
      - ".github/workflows/_component-deploy.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing artifact tag to (re)deploy or roll back to. Blank = build current source."
        required: false
        type: string

concurrency:
  group: deploy-clients-host
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/_component-deploy.yml
    with:
      component: clients-host
      build: buildx
      target: protofast-clients-host
      kind: host
      hash_paths: "clients/host"
      project: clients/host
      tag: ${{ inputs.tag }}
    secrets: inherit
