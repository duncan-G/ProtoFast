name: deploy-api

on:
  push:
    branches: [main]
    paths:
      - "services/api/**"
      - "services/shared/**"
      - ".github/workflows/deploy-api.yml"
      - ".github/workflows/_component-deploy.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing artifact tag to (re)deploy or roll back to. Blank = build current source."
        required: false
        type: string

concurrency:
  group: deploy-api
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/_component-deploy.yml
    with:
      component: api
      build: dotnet
      target: protofast-api
      kind: service
      hash_paths: "services/api services/shared"
      project: services/api/src/ProtoFast.Api
      tag: ${{ inputs.tag }}
    secrets: inherit
