# Deploy cloudflared (the outbound Cloudflare tunnel — the only thing reaching
# the public edge).
#
# Like deploy-aspire.yml, cloudflared is NOT an artifact we build: it's the
# upstream public image cloudflare/cloudflared pinned by version tag. So this
# workflow does NOT use _component-deploy.yml (test -> build/reuse -> deploy);
# there is nothing to test or build. It only ships the current compose +
# deploy.sh to the box and runs `deploy.sh apply cloudflared=<tag>`, which writes
# CLOUDFLARED_TAG into versions.env, pulls + recreates only that container
# (--no-deps), health-checks the tunnel's /ready endpoint, and rolls the tag back
# on failure.
#
# cloudflared also comes up at instance boot via `deploy.sh bootstrap`; this
# workflow is the on-demand lever to (re)deploy or bump it on a running box.
#
# Repo VARIABLES (set by infra/bootstrap): AWS_REGION, AWS_DEPLOY_ROLE_ARN,
#   ECR_REGISTRY.
name: deploy-cloudflared

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-cloudflared.yml"
      - "deploy/docker-compose.host-a.yml"
      - "deploy/deploy.sh"
  workflow_dispatch:
    inputs:
      tag:
        description: "cloudflared image tag to deploy or roll back to. Blank = default."
        required: false
        type: string

concurrency:
  group: deploy-cloudflared
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # GitHub OIDC -> AWS

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR: ${{ vars.ECR_REGISTRY }}
  INSTANCE_TAG_KEY: "protofast:role"
  INSTANCE_TAG_VALUE: "app-server"
  # The pinned upstream image tag. Bump here (or override via workflow_dispatch)
  # to roll the tunnel forward/back; keep in sync with the compose default
  # (CLOUDFLARED_TAG) in deploy/docker-compose.host-a.yml.
  DEFAULT_CLOUDFLARED_TAG: "2026.6.1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    # No `environment:` — see _component-deploy.yml: an environment changes the
    # OIDC `sub` and would break the deploy role's ref-scoped trust.
    steps:
      - uses: actions/checkout@v5

      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          [ -n "$tag" ] || tag="${DEFAULT_CLOUDFLARED_TAG}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "deploying cloudflared tag=${tag}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve target instance
        id: target
        run: |
          set -euo pipefail
          # cloudflared is an edge component (Host A): scope to the Role=edge sibling.
          id=$(aws ec2 describe-instances \
            --filters "Name=tag:${INSTANCE_TAG_KEY},Values=${INSTANCE_TAG_VALUE}" \
                      "Name=tag:Role,Values=edge" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          [ -n "$id" ] || { echo "no running edge instance with ${INSTANCE_TAG_KEY}=${INSTANCE_TAG_VALUE}" >&2; exit 1; }
          echo "instance_id=$id" >> "$GITHUB_OUTPUT"

      # Ship the compose file + deploy script to the instance and run
      # `deploy.sh apply cloudflared=<tag>`. SSM Run Command — no SSH, no ports.
      - name: Deploy via SSM
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          # Stream the command's full stdout/stderr to CloudWatch Logs. This is the
          # UNCAPPED record: get-command-invocation's StandardOutputContent /
          # StandardErrorContent are truncated to 2500 chars each, which drops the
          # real failing line for a verbose apply. The instance role's
          # AmazonSSMManagedInstanceCore already grants the logs:Put* SSM needs, and
          # the deploy role's ReadLogs statement (infra/bootstrap/roles.tf) reads it back.
          LOG_GROUP: /protofast/deploy
        run: |
          set -euo pipefail
          COMPOSE_B64=$(base64 -w0 deploy/docker-compose.host-a.yml)
          DEPLOY_B64=$(base64 -w0 deploy/deploy.sh)

          cmd_id=$(aws ssm send-command \
            --instance-ids "${{ steps.target.outputs.instance_id }}" \
            --document-name AWS-RunShellScript \
            --comment "deploy cloudflared=${TAG}" \
            --cloud-watch-output-config "CloudWatchLogGroupName=${LOG_GROUP},CloudWatchOutputEnabled=true" \
            --parameters commands="[
              \"set -eu\",
              \"mkdir -p /opt/protofast\",
              \"echo $COMPOSE_B64 | base64 -d > /opt/protofast/docker-compose.yml\",
              \"echo $DEPLOY_B64 | base64 -d > /opt/protofast/deploy.sh\",
              \"chmod +x /opt/protofast/deploy.sh\",
              \"ECR=${ECR} /opt/protofast/deploy.sh apply cloudflared=${TAG}\"
            ]" \
            --query 'Command.CommandId' --output text)

          echo "SSM command: $cmd_id"

          # Poll until terminal; surface the on-instance output and fail loudly.
          while :; do
            status=$(aws ssm get-command-invocation \
              --command-id "$cmd_id" \
              --instance-id "${{ steps.target.outputs.instance_id }}" \
              --query 'Status' --output text 2>/dev/null || echo Pending)
            case "$status" in
              Success) break ;;
              Failed|Cancelled|TimedOut) echo "deploy $status"; break ;;
              *) sleep 8 ;;
            esac
          done

          aws ssm get-command-invocation \
            --command-id "$cmd_id" \
            --instance-id "${{ steps.target.outputs.instance_id }}" \
            --query '{Status:Status,Out:StandardOutputContent,Err:StandardErrorContent}' \
            --output text

          # On any non-success, dump the FULL stdout+stderr from CloudWatch (uncapped)
          # so the real failing line is always in the Actions log rather than the
          # truncated inline view. Retry briefly: SSM flushes to CloudWatch around
          # the time the invocation goes terminal.
          if [ "$status" != Success ]; then
            echo "::group::Full deploy output (CloudWatch ${LOG_GROUP})"
            for attempt in 1 2 3 4 5; do
              events=$(aws logs filter-log-events \
                --log-group-name "$LOG_GROUP" \
                --log-stream-name-prefix "${cmd_id}/${{ steps.target.outputs.instance_id }}" \
                --output json 2>/dev/null | jq -r '.events[].message' 2>/dev/null || true)
              if [ -n "$events" ]; then
                printf '%s\n' "$events"
                break
              fi
              echo "(waiting for CloudWatch to flush… attempt ${attempt}/5)"
              sleep 5
            done
            echo "::endgroup::"
          fi

          [ "$status" = "Success" ]
