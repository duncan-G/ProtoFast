name: deploy-auth

on:
  push:
    branches: [main]
    paths:
      - "services/auth/**"
      - "services/shared/**"
      - ".github/workflows/deploy-auth.yml"
      - ".github/workflows/_component-deploy.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing artifact tag to (re)deploy or roll back to. Blank = build current source."
        required: false
        type: string

concurrency:
  group: deploy-auth
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/_component-deploy.yml
    with:
      component: auth
      build: dotnet
      target: protofast-auth
      kind: service
      hash_paths: "services/auth services/shared"
      project: services/auth/src/ProtoFast.Auth.Api
      tag: ${{ inputs.tag }}
    secrets: inherit
